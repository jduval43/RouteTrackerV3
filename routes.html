<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f1117">
<meta name="mobile-web-app-capable" content="yes">
<title>Route Index</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0f1117;--surface:#1a1d27;--card:#21253a;--accent:#f5a623;--accent2:#4fc3f7;--done:#2e7d32;--done-text:#81c784;--text:#e8eaf6;--muted:#7986cb;--border:#2e3256;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:var(--bg);color:var(--text);font-family:'IBM Plex Mono',monospace;min-height:100vh;}

  .header{background:var(--surface);border-bottom:2px solid var(--accent);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
  .header-left{display:flex;align-items:center;gap:12px;}
  .back-btn{background:var(--card);border:1px solid var(--border);color:var(--accent2);border-radius:8px;padding:7px 14px;font-family:'Bebas Neue',sans-serif;font-size:18px;cursor:pointer;text-decoration:none;white-space:nowrap;}
  .page-title{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--accent);letter-spacing:2px;line-height:1;}
  .page-sub{font-size:9px;color:var(--muted);letter-spacing:1px;}

  .save-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;gap:8px;align-items:center;}
  .save-input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:13px;padding:10px 12px;outline:none;}
  .save-input:focus{border-color:var(--accent);}
  .save-input::placeholder{color:var(--muted);}
  .save-btn{background:var(--accent);color:#000;border:none;border-radius:8px;padding:10px 16px;font-family:'Bebas Neue',sans-serif;font-size:18px;cursor:pointer;white-space:nowrap;}
  .save-btn:active{opacity:0.75;}

  .content{padding:12px 12px 100px;display:flex;flex-direction:column;gap:10px;}

  .section-label{font-size:10px;color:var(--muted);letter-spacing:2px;padding:4px 4px 2px;text-transform:uppercase;}

  /* ACTIVE ROUTE BANNER */
  .active-banner{background:linear-gradient(135deg,#1b2a4a,#1a2438);border:1px solid var(--accent2);border-radius:12px;padding:14px 16px;display:flex;flex-direction:column;gap:8px;}
  .active-label{font-size:10px;color:var(--accent2);letter-spacing:2px;}
  .active-name{font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--accent);line-height:1;}
  .active-stats{font-size:11px;color:var(--muted);}
  .active-actions{display:flex;gap:8px;}
  .act-btn{flex:1;padding:9px 8px;border:none;border-radius:8px;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;cursor:pointer;}
  .act-btn:active{opacity:0.7;}
  .act-go{background:var(--accent);color:#000;}
  .act-save{background:var(--done);color:var(--done-text);}

  /* ROUTE CARDS */
  .route-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 14px 10px;display:flex;flex-direction:column;gap:8px;transition:border-color 0.2s;}
  .route-card.loaded{border-color:var(--accent2);}
  .route-card-top{display:flex;align-items:flex-start;gap:10px;}
  .route-num{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--accent);line-height:1;min-width:36px;text-align:center;}
  .route-info{flex:1;min-width:0;}
  .route-name{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--text);line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .route-meta{font-size:10px;color:var(--muted);margin-top:3px;line-height:1.5;}
  .route-progress{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:4px;}
  .route-progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;}
  .route-card-btns{display:flex;gap:6px;}
  .rc-btn{flex:1;padding:8px 6px;border:none;border-radius:7px;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1px;cursor:pointer;}
  .rc-btn:active{opacity:0.65;}
  .rc-load{background:#1b3a5a;color:var(--accent2);border:1px solid var(--accent2);}
  .rc-ow{background:var(--done);color:var(--done-text);}
  .rc-del{background:#1a0a0a;color:#ef9a9a;border:1px solid #7f0000;}
  .rc-exp{background:var(--surface);color:var(--muted);border:1px solid var(--border);}

  .empty-state{text-align:center;padding:50px 20px;color:var(--muted);font-size:13px;line-height:2;}
  .empty-icon{font-size:48px;display:block;margin-bottom:12px;opacity:0.3;}

  /* TOAST */
  .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--done);color:var(--done-text);padding:12px 24px;border-radius:30px;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:999;white-space:nowrap;}
  .toast.show{opacity:1;}
  .toast.err{background:#b71c1c;color:#ffcdd2;}

  /* MODAL */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:200;align-items:flex-end;justify-content:center;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--surface);border-radius:20px 20px 0 0;border-top:2px solid var(--accent2);padding:20px 16px 40px;width:100%;max-width:600px;display:flex;flex-direction:column;gap:14px;}
  .modal h3{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--accent);letter-spacing:1px;}
  .modal p{font-size:12px;color:var(--muted);line-height:1.6;}
  .modal-row{display:flex;gap:8px;}
  .modal-cancel{flex:1;background:var(--card);color:var(--muted);border:1px solid var(--border);border-radius:8px;padding:12px;font-family:'Bebas Neue',sans-serif;font-size:18px;cursor:pointer;}
  .modal-confirm{flex:2;background:#b71c1c;color:#ffcdd2;border:none;border-radius:8px;padding:12px;font-family:'Bebas Neue',sans-serif;font-size:18px;cursor:pointer;}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <a class="back-btn" href="index.html">&#9664; BACK</a>
    <div>
      <div class="page-title">ROUTE INDEX</div>
      <div class="page-sub">SAVE &bull; LOAD &bull; MANAGE</div>
    </div>
  </div>
</div>

<!-- SAVE BAR: always visible at top -->
<div class="save-bar">
  <input class="save-input" id="save-name-input" type="text" placeholder="Route name to save current route..." maxlength="60">
  <button class="save-btn" onclick="saveCurrentRoute()">&#128190; SAVE</button>
</div>

<div class="content" id="content">
  <!-- rendered by JS -->
</div>

<div class="toast" id="toast"></div>

<!-- CONFIRM DELETE MODAL -->
<div class="modal-overlay" id="del-modal">
  <div class="modal">
    <h3>DELETE ROUTE?</h3>
    <p id="del-modal-msg">This will permanently delete this saved route. Active route is not affected.</p>
    <div class="modal-row">
      <button class="modal-cancel" onclick="closeDelModal()">CANCEL</button>
      <button class="modal-confirm" id="del-confirm-btn">DELETE</button>
    </div>
  </div>
</div>

<script>
const ACTIVE_STOPS_KEY  = 'r002_stops';
const ACTIVE_IDX_KEY    = 'r002_idx';
const ACTIVE_LABEL_KEY  = 'r002_label';
const ACTIVE_SUB_KEY    = 'r002_sub';
const ACTIVE_ZIP_KEY    = 'r002_zip';
const INDEX_KEY         = 'r002_route_index'; // array of route IDs (strings)
const ROUTE_PREFIX      = 'r002_route_';      // + id = full key

// ---- STORAGE HELPERS ----
function getIndex() {
  try { return JSON.parse(localStorage.getItem(INDEX_KEY) || '[]'); } catch(e) { return []; }
}
function setIndex(arr) { localStorage.setItem(INDEX_KEY, JSON.stringify(arr)); }

function getRoute(id) {
  try { return JSON.parse(localStorage.getItem(ROUTE_PREFIX + id) || 'null'); } catch(e) { return null; }
}
function setRoute(id, data) { localStorage.setItem(ROUTE_PREFIX + id, JSON.stringify(data)); }
function deleteRoute(id) {
  localStorage.removeItem(ROUTE_PREFIX + id);
  const idx = getIndex().filter(x => x !== id);
  setIndex(idx);
}

function getActive() {
  try {
    const stops = JSON.parse(localStorage.getItem(ACTIVE_STOPS_KEY) || '[]');
    const curIdx = parseInt(localStorage.getItem(ACTIVE_IDX_KEY) || '0');
    const label = localStorage.getItem(ACTIVE_LABEL_KEY) || 'ROUTE R002';
    const sub   = localStorage.getItem(ACTIVE_SUB_KEY)   || 'USPS Oakland City IN';
    const zip   = localStorage.getItem(ACTIVE_ZIP_KEY)   || 'Oakland City, IN 47660';
    return { stops, curIdx, label, sub, zip };
  } catch(e) { return null; }
}

function makeId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

// ---- SAVE CURRENT ROUTE ----
function saveCurrentRoute() {
  const name = document.getElementById('save-name-input').value.trim();
  if (!name) { showToast('Enter a route name first', true); return; }

  const active = getActive();
  if (!active || !active.stops.length) { showToast('No active route to save', true); return; }

  // Check if name already exists - if so, overwrite
  const idx = getIndex();
  let existingId = null;
  for (const id of idx) {
    const r = getRoute(id);
    if (r && r.name.toLowerCase() === name.toLowerCase()) { existingId = id; break; }
  }

  const id = existingId || makeId();
  const done = active.stops.filter(s => s.status === 'done').length;
  const total = active.stops.length;

  const routeData = {
    id,
    name,
    label: active.label,
    sub: active.sub,
    zip: active.zip,
    stops: active.stops,
    curIdx: active.curIdx,
    savedAt: Date.now(),
    done,
    total
  };

  setRoute(id, routeData);
  if (!existingId) { idx.push(id); setIndex(idx); }

  document.getElementById('save-name-input').value = '';
  showToast(existingId ? 'Route updated!' : 'Route saved!');
  render();
}

// ---- LOAD ROUTE INTO ACTIVE ----
function loadRoute(id) {
  const r = getRoute(id);
  if (!r) { showToast('Route not found', true); return; }
  localStorage.setItem(ACTIVE_STOPS_KEY, JSON.stringify(r.stops));
  localStorage.setItem(ACTIVE_IDX_KEY, r.curIdx || '0');
  localStorage.setItem(ACTIVE_LABEL_KEY, r.label || r.name);
  localStorage.setItem(ACTIVE_SUB_KEY, r.sub || '');
  if (r.zip) localStorage.setItem(ACTIVE_ZIP_KEY, r.zip);
  showToast('Loaded: ' + r.name);
  setTimeout(() => window.location.href = 'index.html', 800);
}

// ---- OVERWRITE SAVED ROUTE WITH CURRENT ACTIVE ----
function overwriteRoute(id) {
  const r = getRoute(id);
  if (!r) return;
  const active = getActive();
  if (!active || !active.stops.length) { showToast('No active route to save', true); return; }
  const done = active.stops.filter(s => s.status === 'done').length;
  const updated = { ...r, stops: active.stops, curIdx: active.curIdx, savedAt: Date.now(), done, total: active.stops.length };
  setRoute(id, updated);
  showToast('Overwritten: ' + r.name);
  render();
}

// ---- EXPORT ROUTE AS CSV ----
function exportRoute(id) {
  const r = getRoute(id);
  if (!r) return;
  const rows = ['seq,address,note,status'];
  r.stops.forEach(s => {
    const note = (s.note || '').replace(/,/g,'|');
    const addr = (s.addr || '').replace(/,/g,'|');
    rows.push(`${s.seq},"${addr}","${note}",${s.status}`);
  });
  const blob = new Blob([rows.join('\n')], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = r.name.replace(/[^a-z0-9]/gi,'_') + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

// ---- DELETE ----
let pendingDeleteId = null;
function confirmDelete(id) {
  const r = getRoute(id);
  if (!r) return;
  pendingDeleteId = id;
  document.getElementById('del-modal-msg').textContent = 'Delete "' + r.name + '"? This cannot be undone. Your active route is not affected.';
  document.getElementById('del-confirm-btn').onclick = () => {
    deleteRoute(pendingDeleteId);
    closeDelModal();
    showToast('Deleted');
    render();
  };
  document.getElementById('del-modal').classList.add('open');
}
function closeDelModal() { document.getElementById('del-modal').classList.remove('open'); pendingDeleteId = null; }
document.getElementById('del-modal').addEventListener('click', function(e) { if(e.target===this) closeDelModal(); });

// ---- TOAST ----
let toastTimer;
function showToast(msg, err=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (err ? ' err' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.className = 'toast', 2200);
}

// ---- RENDER ----
function formatDate(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) + ' ' + d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
}

function render() {
  const content = document.getElementById('content');
  const idx = getIndex();
  const active = getActive();

  let html = '';

  // ---- ACTIVE ROUTE CARD ----
  if (active && active.stops.length) {
    const done = active.stops.filter(s => s.status === 'done').length;
    const total = active.stops.length;
    const pct = total ? Math.round(done/total*100) : 0;
    const pending = total - done - active.stops.filter(s=>s.status==='skipped').length;
    html += `
    <div class="section-label">Active Route</div>
    <div class="active-banner">
      <div class="active-label">&#9654; CURRENTLY LOADED</div>
      <div class="active-name">${escHtml(active.label)}</div>
      <div class="active-stats">${done}/${total} delivered &bull; ${pending} pending &bull; ${pct}%</div>
      <div class="route-progress"><div class="route-progress-fill" style="width:${pct}%"></div></div>
      <div class="active-actions">
        <a class="act-btn act-go" href="index.html" style="text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center;">&#9654; RUN ROUTE</a>
      </div>
    </div>`;
  }

  // ---- SAVED ROUTES ----
  html += `<div class="section-label" style="margin-top:8px;">Saved Routes (${idx.length})</div>`;

  if (!idx.length) {
    html += `<div class="empty-state"><span class="empty-icon">&#128466;</span>No saved routes yet.<br>Type a name above and tap SAVE<br>to store your current route.</div>`;
  } else {
    // Load all and sort newest first
    const routes = idx.map(id => getRoute(id)).filter(Boolean);
    routes.sort((a,b) => (b.savedAt||0) - (a.savedAt||0));

    routes.forEach((r, i) => {
      const done = r.done || 0;
      const total = r.total || r.stops.length;
      const pct = total ? Math.round(done/total*100) : 0;
      const skipped = (r.stops || []).filter(s => s.status === 'skipped').length;
      html += `
      <div class="route-card" id="rc-${r.id}">
        <div class="route-card-top">
          <div class="route-num">${i+1}</div>
          <div class="route-info">
            <div class="route-name">${escHtml(r.name)}</div>
            <div class="route-meta">
              ${total} stops &bull; ${done} done &bull; ${skipped} skipped<br>
              Saved ${formatDate(r.savedAt)}
            </div>
            <div class="route-progress" style="margin-top:6px;"><div class="route-progress-fill" style="width:${pct}%"></div></div>
          </div>
        </div>
        <div class="route-card-btns">
          <button class="rc-btn rc-load" onclick="loadRoute('${r.id}')">&#9654; LOAD</button>
          <button class="rc-btn rc-ow" onclick="overwriteRoute('${r.id}')">&#8593; UPDATE</button>
          <button class="rc-btn rc-exp" onclick="exportRoute('${r.id}')">&#8595; CSV</button>
          <button class="rc-btn rc-del" onclick="confirmDelete('${r.id}')">&#10005;</button>
        </div>
      </div>`;
    });
  }

  content.innerHTML = html;
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Pre-fill save input with active route name if available
window.addEventListener('load', () => {
  const lbl = localStorage.getItem(ACTIVE_LABEL_KEY);
  if (lbl) document.getElementById('save-name-input').placeholder = 'e.g. ' + lbl + ' (today\'s date)';
  render();
});

// Save on Enter key
document.getElementById('save-name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') saveCurrentRoute();
});
</script>
</body>
</html>
